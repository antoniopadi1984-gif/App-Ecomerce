<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcomBoom Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; }
        
        .header { background: #1a1a2e; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 32px; height: 32px; background: #FF6B2B; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .header-info { flex: 1; min-width: 0; }
        .header-title { font-size: 11px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 0.05em; }
        .header-sub { font-size: 9px; color: #888; margin-top: 1px; truncate: ellipsis; white-space: nowrap; overflow: hidden; }
        .header-status { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
        .header-status.offline { background: #ef4444; }

        .platform-banner { padding: 8px 14px; font-size: 10px; font-weight: 700; display: none; align-items: center; gap: 6px; }
        .platform-banner.meta { background: #1877f2; color: white; }
        .platform-banner.tiktok { background: #000; color: white; }
        .platform-banner.show { display: flex; }

        .content { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        .section { background: white; border-radius: 10px; padding: 10px; border: 1px solid #eee; }
        .section-title { font-size: 8px; font-weight: 900; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.15s; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #FF6B2B, #ff8c42); color: white; padding: 9px 12px; width: 100%; box-shadow: 0 2px 8px rgba(255,107,43,0.3); }
        .btn-primary:hover { box-shadow: 0 4px 12px rgba(255,107,43,0.4); }
        .btn-dark { background: #1a1a2e; color: white; padding: 9px 12px; width: 100%; }
        .btn-dark:hover { background: #2a2a3e; }
        .btn-outline { background: white; color: #1a1a2e; border: 1.5px solid #e5e7eb; padding: 8px 12px; flex: 1; }
        .btn-outline:hover { border-color: #FF6B2B; color: #FF6B2B; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn-col { display: flex; flex-direction: column; gap: 6px; }
        .btn-meta { background: #1877f2; color: white; padding: 9px 12px; width: 100%; }
        .btn-tiktok { background: #000; color: white; padding: 9px 12px; width: 100%; }
        .btn-success { background: #16a34a !important; }
        .btn-error { background: #dc2626 !important; }

        select { width: 100%; padding: 7px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 10px; font-weight: 600; color: #1a1a2e; background: white; outline: none; cursor: pointer; }
        select:focus { border-color: #FF6B2B; }

        .product-row { display: flex; gap: 6px; align-items: center; }
        .btn-new-product { background: #FF6B2B; color: white; border: none; border-radius: 6px; padding: 7px 10px; font-size: 9px; font-weight: 900; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

        .history-list { list-style: none; display: flex; flex-direction: column; gap: 4px; max-height: 100px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; gap-8px; padding: 5px 8px; background: #f8f9fa; border-radius: 6px; }
        .history-item .hi-info { flex: 1; min-width: 0; }
        .history-item .hi-title { font-size: 9px; font-weight: 700; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .history-item .hi-time { font-size: 8px; color: #888; }
        .history-item .hi-check { font-size: 10px; flex-shrink: 0; margin-left: 6px; }
        .history-empty { font-size: 9px; color: #aaa; text-align: center; padding: 8px; }

        .progress-overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 999; }
        .progress-overlay.show { display: flex; }
        .progress-title { font-size: 11px; font-weight: 900; color: white; text-align: center; }
        .progress-step { font-size: 9px; color: #888; }
        .progress-bar-bg { width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #FF6B2B; border-radius: 2px; transition: width 0.3s; }
        .btn-cancel { background: none; border: none; color: #888; font-size: 9px; cursor: pointer; margin-top: 8px; }
        .btn-cancel:hover { color: white; }

        .footer { padding: 8px 14px; text-align: center; border-top: 1px solid #eee; background: white; }
        .footer a { font-size: 9px; font-weight: 700; color: #FF6B2B; text-decoration: none; text-transform: uppercase; letter-spacing: 0.05em; }

        .badge { display: inline-flex; align-items: center; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 900; }
        .badge-green { background: #dcfce7; color: #16a34a; }
        .badge-orange { background: #fff3ed; color: #FF6B2B; }

        .hidden { display: none !important; }
        .analyze-row { display: flex; gap: 5px; margin-top: 6px; }
    </style>
</head>
<body>
<div id="app">
    <!-- PLATFORM BANNER -->
    <div id="banner-meta" class="platform-banner meta">📘 Meta Ads Library detectada</div>
    <div id="banner-tiktok" class="platform-banner tiktok">🎵 TikTok detectado</div>

    <div class="header">
        <div class="header-logo">🚀</div>
        <div class="header-info">
            <div class="header-title" id="user-name">EcomBoom Intelligence</div>
            <div class="header-sub" id="store-name">Conectando...</div>
        </div>
        <div class="header-status" id="conn-status"></div>
    </div>

    <div class="content">
        <!-- ACCIONES PRINCIPALES -->
        <div class="section">
            <div class="section-title">Capturar esta página</div>
            <div class="btn-col">
                <button class="btn btn-primary" id="btn-save">📥 Guardar Creativo</button>
                <div class="btn-grid">
                    <button class="btn btn-outline" id="btn-download-hd">⬇ Descargar HD</button>
                    <button class="btn btn-outline" id="btn-clone">🏘️ Clonar Landing</button>
                </div>
            </div>
        </div>

        <!-- META ESPECÍFICO -->
        <div class="section hidden" id="meta-section">
            <div class="section-title">📘 Meta Ads Library</div>
            <div class="btn-col">
                <button class="btn btn-meta" id="btn-meta-spy">⚡ Espiar Biblioteca Completa</button>
                <div class="btn-grid">
                    <button class="btn btn-outline" id="btn-meta-download-all">⬇ Descargar Todo</button>
                    <button class="btn btn-outline" id="btn-meta-analyze">🧠 Analizar con IA</button>
                </div>
            </div>
        </div>

        <!-- TIKTOK ESPECÍFICO -->
        <div class="section hidden" id="tiktok-section">
            <div class="section-title">🎵 TikTok</div>
            <div class="btn-col">
                <button class="btn btn-tiktok" id="btn-tiktok-video">🎬 Capturar Vídeo</button>
                <button class="btn btn-outline" id="btn-tiktok-profile">👥 Capturar Perfil</button>
            </div>
        </div>

        <!-- PRODUCTO ACTIVO -->
        <div class="section">
            <div class="section-title">Producto activo</div>
            <div class="product-row">
                <select id="product-selector">
                    <option value="">Cargando...</option>
                </select>
                <button class="btn-new-product" id="btn-new-product">+ Nuevo</button>
            </div>
        </div>

        <!-- HISTORIAL -->
        <div class="section">
            <div class="section-title">Últimas capturas</div>
            <ul class="history-list" id="history-list">
                <li class="history-empty">Sin capturas recientes</li>
            </ul>
        </div>
    </div>

    <div class="footer">
        <a href="http://localhost:3000/centro-creativo/competencia" target="_blank" id="link-panel">Ver Panel de Control →</a>
    </div>

    <!-- OVERLAY PROGRESO -->
    <div class="progress-overlay" id="progress-overlay">
        <div class="progress-title" id="progress-title">Procesando...</div>
        <div class="progress-step" id="progress-step">Iniciando</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
        <button class="btn-cancel" id="btn-cancel">Cancelar</button>
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
