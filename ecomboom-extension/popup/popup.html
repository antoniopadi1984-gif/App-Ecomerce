<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>EcomBoom Spy</title>
    <style>
        body { width: 320px; font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #0f172a; color: white; }
        .header { padding: 12px 16px; border-bottom: 1px solid #1e293b; background: #020617; }
        .header h1 { margin: 0; font-size: 16px; font-weight: 800; color: #a78bfa; display: flex; align-items: center; gap: 8px; }
        .content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .select-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input { padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 13px; outline: none; }
        select:focus, input:focus { border-color: #8b5cf6; }
        .section-title { font-size: 12px; font-weight: 700; margin-top: 8px; margin-bottom: 4px; color: #cbd5e1; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; background: #1e293b; color: white; }
        .btn:hover { background: #334155; }
        .btn.primary { background: #7c3aed; }
        .btn.primary:hover { background: #8b5cf6; }
        
        #meta-ui, #tiktok-ui, #landing-ui { display: none; }
        
        .progress-bar { display: none; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: #10b981; width: 0%; transition: width 0.3s ease; }
        #status { font-size: 11px; color: #10b981; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 EcomBoom Spy</h1>
    </div>
    <div class="content">
        <div class="select-group">
            <label>Producto Activo</label>
            <select id="product-select">
                <option value="">Cargando productos...</option>
            </select>
        </div>
        <div class="select-group">
            <label>Competidor / Carpeta Destino</label>
            <select id="competitor-select">
                <option value="GENERAL">General ESPÍA (02_SPY)</option>
            </select>
            <input type="text" id="new-competitor" placeholder="+ Nuevo competidor..." style="display: none; margin-top: 6px;" />
        </div>

        <div id="meta-ui" class="action-group">
            <div class="section-title">Meta Ads Library</div>
            <button class="btn" id="meta-save-single">Guardar este anuncio</button>
            <button class="btn primary" id="meta-save-all">Guardar biblioteca completa</button>
            <button class="btn" id="meta-save-videos">Guardar solo vídeos</button>
            <button class="btn" id="meta-save-images">Guardar solo imágenes</button>
        </div>

        <div id="tiktok-ui" class="action-group">
            <div class="section-title">TikTok Ads Library</div>
            <button class="btn" id="tiktok-save-single">Guardar este anuncio</button>
            <button class="btn primary" id="tiktok-save-all">Guardar biblioteca completa</button>
            <button class="btn" id="tiktok-save-videos">Guardar webm/vídeos</button>
            <button class="btn" id="tiktok-save-images">Guardar solo imágenes/GIFs</button>
        </div>

        <div id="landing-ui" class="action-group">
            <div class="section-title">Landing & Spy</div>
            <button class="btn primary" id="landing-clone">Clonar página completa</button>
            <button class="btn" id="landing-screenshot">Capturar Screenshot</button>
            <button class="btn" id="landing-copy">Extraer Copy solamente</button>
            <button class="btn" id="landing-structure">Extraer estructura solamente</button>
        </div>

        <div class="progress-bar" id="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
        <div id="status"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
